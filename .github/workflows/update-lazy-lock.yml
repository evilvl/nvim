name: Update lazy-lock.json

on:
  schedule:
    # Запуск каждый понедельник в 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch: # Возможность ручного запуска

permissions:
  contents: write

jobs:
  update-lazy-lock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Setup config path
        run: |
          # Создаём symlink в ~/.config/nvim чтобы nvim нашёл config
          mkdir -p ~/.config
          ln -sf "${GITHUB_WORKSPACE}" ~/.config/nvim

      - name: Update plugins
        run: |
          nvim --headless -c "lua require('lazy').sync({wait=true})" -c "qa"
        timeout-minutes: 15

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lazy-lock.json
          git diff --staged --quiet || git commit -m "chore: auto-update lazy-lock.json"
          git push
